name: Deploy to Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lambda dependencies
        run: |
          cd backend/functions/save-score && npm install
          cd ../leaderboard && npm install

      - name: Deploy Lambda functions to dev
        run: |
          cd backend/functions/daily-challenge
          zip -r ../daily-challenge.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-daily-challenge-dev \
            --zip-file fileb://../daily-challenge.zip

          cd ../save-score
          zip -r ../save-score.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-save-score-dev \
            --zip-file fileb://../save-score.zip

          cd ../leaderboard
          zip -r ../leaderboard.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-leaderboard-dev \
            --zip-file fileb://../leaderboard.zip

      - name: Inject dev API URL into frontend
        run: |
          sed -i "s|__API_URL__|${{ secrets.DEV_API_URL }}|g" frontend/index.html

      - name: Sync frontend to dev S3 bucket
        run: |
          aws s3 sync frontend/ s3://${{ secrets.DEV_S3_BUCKET }}/ --delete
