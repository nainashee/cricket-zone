name: Deploy to Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lambda dependencies
        run: |
          cd backend/functions/save-score && npm install
          cd ../leaderboard && npm install
          cd ../delete-account && npm install
          cd ../avatar-upload && npm install

      - name: Deploy Lambda functions to dev
        run: |
          cd backend/functions/daily-challenge
          zip -r ../daily-challenge.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-daily-challenge-dev \
            --zip-file fileb://../daily-challenge.zip

          cd ../save-score
          zip -r ../save-score.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-save-score-dev \
            --zip-file fileb://../save-score.zip

          cd ../leaderboard
          zip -r ../leaderboard.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-leaderboard-dev \
            --zip-file fileb://../leaderboard.zip

          cd ../delete-account
          zip -r ../delete-account.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-delete-account-dev \
            --zip-file fileb://../delete-account.zip

          cd ../avatar-upload
          zip -r ../avatar-upload.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-avatar-upload-dev \
            --zip-file fileb://../avatar-upload.zip

      - name: Inject dev config into frontend
        run: |
          sed -i "s|__API_URL__|${{ secrets.DEV_API_URL }}|g" frontend/index.html
          sed -i "s|__COGNITO_USER_POOL_ID__|${{ secrets.DEV_COGNITO_USER_POOL_ID }}|g" frontend/index.html
          sed -i "s|__COGNITO_CLIENT_ID__|${{ secrets.DEV_COGNITO_CLIENT_ID }}|g" frontend/index.html
          sed -i "s|__COGNITO_DOMAIN__|${{ secrets.DEV_COGNITO_DOMAIN }}|g" frontend/index.html
          sed -i "s|__AVATAR_BASE_URL__|http://cricket-zone-frontend-hussain-dev.s3-website-us-east-1.amazonaws.com|g" frontend/index.html

      - name: Sync frontend to dev S3 bucket
        run: |
          # sw.js — no-cache: browser relies on a byte-diff to detect SW updates.
          # Must be uploaded before index.html so the SW file exists by the time
          # any browser receives the registration snippet.
          aws s3 cp frontend/sw.js s3://${{ secrets.DEV_S3_BUCKET }}/sw.js \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/javascript"

          # index.html — no-cache: always revalidate before serving.
          aws s3 cp frontend/index.html s3://${{ secrets.DEV_S3_BUCKET }}/index.html \
            --cache-control "no-cache" \
            --content-type "text/html; charset=utf-8"

          aws s3 sync frontend/ s3://${{ secrets.DEV_S3_BUCKET }}/ \
            --delete \
            --exclude 'content/bowling/*' \
            --exclude 'sw.js' \
            --exclude 'index.html'
