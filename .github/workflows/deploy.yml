name: Deploy Cricket Zone

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run unit tests
        run: cd tests/unit && npm ci && node --experimental-vm-modules node_modules/jest/bin/jest.js --no-coverage

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lambda dependencies
        run: |
          cd backend/functions/save-score && npm install
          cd ../leaderboard && npm install
          cd ../delete-account && npm install
          cd ../avatar-upload && npm install

      - name: Deploy Lambda functions to prod
        run: |
          cd backend/functions/daily-challenge
          zip -r ../daily-challenge.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-daily-challenge \
            --zip-file fileb://../daily-challenge.zip

          cd ../save-score
          zip -r ../save-score.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-save-score \
            --zip-file fileb://../save-score.zip

          cd ../leaderboard
          zip -r ../leaderboard.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-leaderboard \
            --zip-file fileb://../leaderboard.zip

          cd ../delete-account
          zip -r ../delete-account.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-delete-account \
            --zip-file fileb://../delete-account.zip

          cd ../avatar-upload
          zip -r ../avatar-upload.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-avatar-upload \
            --zip-file fileb://../avatar-upload.zip

          cd ../played-today
          zip -r ../played-today.zip .
          aws lambda update-function-code \
            --function-name cricket-zone-played-today \
            --zip-file fileb://../played-today.zip

      - name: Inject prod config into frontend
        run: |
          sed -i "s|__API_URL__|${{ secrets.PROD_API_URL }}|g" frontend/index.html
          sed -i "s|__COGNITO_USER_POOL_ID__|${{ secrets.PROD_COGNITO_USER_POOL_ID }}|g" frontend/index.html
          sed -i "s|__COGNITO_CLIENT_ID__|${{ secrets.PROD_COGNITO_CLIENT_ID }}|g" frontend/index.html
          sed -i "s|__COGNITO_DOMAIN__|${{ secrets.PROD_COGNITO_DOMAIN }}|g" frontend/index.html
          sed -i "s|__AVATAR_BASE_URL__|https://playhowzat.com|g" frontend/index.html

      - name: Sync frontend to S3
        run: |
          # sw.js — no-cache: browser relies on a byte-diff to detect SW updates.
          # Must be uploaded before index.html so the SW file exists by the time
          # any browser receives the registration snippet.
          aws s3 cp frontend/sw.js s3://${{ secrets.S3_BUCKET }}/sw.js \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/javascript"

          # index.html — no-cache: always revalidate before serving.
          # Contains injected prod config (API URL, Cognito IDs) that changes
          # on every deploy; browsers and CDN must never serve a stale version.
          aws s3 cp frontend/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache" \
            --content-type "text/html; charset=utf-8"

          # Game data (JSON) — 1-hour cache.
          # Invalidated immediately by the CloudFront /* invalidation that follows.
          aws s3 sync frontend/assets/ s3://${{ secrets.S3_BUCKET }}/assets/ \
            --cache-control "public, max-age=3600" \
            --delete

          # Batting videos — 1-year immutable cache.
          # Large files (400–1500 KiB each) that never change; replace with a
          # targeted CloudFront invalidation if a video is ever swapped out.
          aws s3 sync frontend/content/batting/ s3://${{ secrets.S3_BUCKET }}/content/batting/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

          # Icons, PWA manifest, OG image — 1-week cache (functionally immutable).
          # sw.js and index.html are excluded — both already uploaded above with
          # explicit no-cache headers that this sync must not overwrite.
          # --delete here handles removal of any root-level orphaned objects.
          aws s3 sync frontend/ s3://${{ secrets.S3_BUCKET }}/ \
            --cache-control "public, max-age=604800" \
            --exclude "index.html" \
            --exclude "sw.js" \
            --exclude "assets/*" \
            --exclude "content/*" \
            --exclude ".gitkeep" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"
